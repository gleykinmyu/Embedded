; PUMS Console — STM32F407 + Nextion (example7: McUI overlay)
;
; Библиотеки: Embedded/libs/ (lib_extra_dirs + library.json)
; Приложение: ../../libs/Nextion/examples/example7/app.hpp
;
; clangd: pio run -t compiledb (из этой папки)
; Cursor: .vscode/settings.json.example → settings.json

[platformio]
default_envs = console

[env:console]
platform = ststm32
board = genericSTM32F407VGT6
framework = stm32cube
upload_protocol = stlink
debug_tool = stlink
monitor_speed = 250000

lib_extra_dirs = ../../libs

lib_deps =
    FatFs
    Interfaces
    board

build_flags =
    -std=gnu++17
    -DHSE_VALUE=8000000U
    -DNEX_DEBUG
    ;-DSMCP_DEBUG
    -DNEX_SESSION_QUEUE_CAPACITY=96
    ;-DNEX_TRACE_TX
    ;-DNEX_TRACE_RX
    -I../../libs/Nextion
    -Isrc

monitor_filters = send_on_enter
monitor_echo = yes
