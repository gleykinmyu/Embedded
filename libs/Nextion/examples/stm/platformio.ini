; PlatformIO — пример stm (board + server + HMI sync)
;
; Библиотеки: Embedded/libs/ (lib_extra_dirs + library.json)
; Мини-примеры example1…7: ../exampleN/ (заголовки app.hpp)
;
; clangd: pio run -t compiledb (из этой папки)
; Cursor: .vscode/settings.json.example → settings.json

[platformio]
default_envs = example2

[env]
platform = ststm32
board = genericSTM32F407VGT6
framework = stm32cube
upload_protocol = stlink
debug_tool = stlink
monitor_speed = 250000

lib_extra_dirs = ../../..

build_flags =
    -std=gnu++17
    -DHSE_VALUE=8000000U
    -DNEX_DEBUG
    -I../..

monitor_filters = send_on_enter
monitor_echo = yes

; example1 → main1.cpp
[env:example1]
build_src_filter =
    +<*>
    -<main2.cpp>
    -<main3.cpp>
    -<main4.cpp>
    -<main5.cpp>
    -<main6.cpp>
    -<main7.cpp>

; example2 → main2.cpp (по умолчанию)
[env:example2]
build_src_filter =
    +<*>
    -<main1.cpp>
    -<main3.cpp>
    -<main4.cpp>
    -<main5.cpp>
    -<main6.cpp>
    -<main7.cpp>

