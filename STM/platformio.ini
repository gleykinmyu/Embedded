; PlatformIO Project Configuration File
;
; clangd: после клона или смены platform/board/flags выполните:
;   "%USERPROFILE%\.platformio\penv\Scripts\platformio.exe" run -t compiledb
; (в корне появится compile_commands.json с вашими путями)
; Cursor/VS Code: .vscode/settings.json не в git — скопируйте .vscode/settings.json.example → settings.json и задайте clangd.path под ОС.
;
; Примеры Nextion (индекс N = env exampleN = src/mainN.cpp = lib/Nextion/examples/exampleN/):
;   example1 / main1.cpp — две страницы, MsgBox
;   example2 / main2.cpp — 2 страницы x 10 кнопок, CompIdMap Discover (по умолчанию)
;   example3 / main3.cpp — 10 кнопок, id 1…10 (Compiled)
;   example4 / main4.cpp — прогон ошибок (Register / NIS / Session / Gateway / Stream)
;   example5 / main5.cpp — все конечные виджеты + demo_controls (MCU API)
;   example6 / main6.cpp — latency bench (тот же HMI, что example5)
;   example7 / main7.cpp — McUI overlay z-order (панели, modal, стек виджетов)

[platformio]
default_envs = example2

[env]
platform = ststm32
board = genericSTM32F407VGT6
framework = stm32cube
upload_protocol = stlink
debug_tool = stlink
monitor_speed = 250000

build_flags =
    -std=gnu++17
    -DHSE_VALUE=8000000U
    -DNEX_DEBUG
    -Ilib/Interfaces
    -Ilib/debug
    -Ilib/FatFs
    -Ilib/Nextion

monitor_filters = send_on_enter
monitor_echo = yes

; example1 → main1.cpp
[env:example1]
build_src_filter =
    +<*>
    -<main2.cpp>
    -<main3.cpp>
    -<main4.cpp>
    -<main5.cpp>
    -<main6.cpp>
    -<main7.cpp>

; example2 → main2.cpp, 10 кнопок + CompIdMap Discover
[env:example2]
build_src_filter =
    +<*>
    -<main1.cpp>
    -<main3.cpp>
    -<main4.cpp>
    -<main5.cpp>
    -<main6.cpp>
    -<main7.cpp>

; example3 → main3.cpp, 10 кнопок, id 1…10
[env:example3]
build_src_filter =
    +<*>
    -<main1.cpp>
    -<main2.cpp>
    -<main4.cpp>
    -<main5.cpp>
    -<main6.cpp>
    -<main7.cpp>

; example4 → main4.cpp, автотест ошибок (-DNEX_DEBUG)
[env:example4]
build_src_filter =
    +<*>
    -<main1.cpp>
    -<main2.cpp>
    -<main3.cpp>
    -<main5.cpp>
    -<main6.cpp>
    -<main7.cpp>
build_flags =
    ${env.build_flags}
    -DNEX_DEBUG

; example5 → main5.cpp, все листья nex::comp + прогон атрибутов
[env:example5]
build_src_filter =
    +<*>
    -<main1.cpp>
    -<main2.cpp>
    -<main3.cpp>
    -<main4.cpp>
    -<main6.cpp>
    -<main7.cpp>
build_flags =
    ${env.build_flags}
    -DNEX_DEBUG

; example6 → main6.cpp, latency bench (HMI как example5)
[env:example6]
build_src_filter =
    +<*>
    -<main1.cpp>
    -<main2.cpp>
    -<main3.cpp>
    -<main4.cpp>
    -<main5.cpp>
    -<main7.cpp>
build_flags =
    ${env.build_flags}
    -DNEX_DEBUG

; example7 → main7.cpp, McUI overlay z-order
[env:example7]
build_src_filter =
    +<*>
    -<main1.cpp>
    -<main2.cpp>
    -<main3.cpp>
    -<main4.cpp>
    -<main5.cpp>
    -<main6.cpp>
build_flags =
    ${env.build_flags}
    -DNEX_DEBUG
