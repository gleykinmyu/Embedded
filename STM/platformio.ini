; PlatformIO Project Configuration File
;
; clangd: после клона или смены platform/board/flags выполните:
;   "%USERPROFILE%\.platformio\penv\Scripts\platformio.exe" run -t compiledb
; (в корне появится compile_commands.json с вашими путями)
; Cursor/VS Code: .vscode/settings.json не в git — скопируйте .vscode/settings.json.example → settings.json и задайте clangd.path под ОС.
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:genericSTM32F407VGT6]
platform = ststm32
board = genericSTM32F407VGT6
framework = stm32cube
upload_protocol = stlink
debug_tool = stlink

; irq и прочие объекты lib/board: см. lib/board/library.json (libArchive: false),
; иначе из libboard.a линкер не тянет нужные .o → weak USARTx_IRQHandler из startup.

build_flags =
    -std=gnu++17
    -DHSE_VALUE=8000000U
    -Ilib/Interfaces
    -Ilib/debug
    -Ilib/FatFs

monitor_filters = send_on_enter 
monitor_echo = yes

; Два разных main в проекте — оставляем один (демо в main2.cpp).
build_src_filter = +<*> -<main2.cpp>