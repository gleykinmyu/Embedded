; PlatformIO Project Configuration File
;
; clangd: после клона или смены platform/board/flags выполните:
;   "%USERPROFILE%\.platformio\penv\Scripts\platformio.exe" run -t compiledb
; (в корне появится compile_commands.json с вашими путями)
; Cursor/VS Code: .vscode/settings.json не в git — скопируйте .vscode/settings.json.example → settings.json и задайте clangd.path под ОС.
;
; Примеры Nextion (индекс N = env exampleN = src/mainN.cpp = lib/Nextion/examples/exampleN/):
;   example1 / main1.cpp — две страницы, MsgBox
;   example2 / main2.cpp — 2 страницы x 10 кнопок, CID Discover (по умолчанию)
;   example3 / main3.cpp — 10 кнопок, id 1…10 (Compiled)

[platformio]
default_envs = example2

[env]
platform = ststm32
board = genericSTM32F407VGT6
framework = stm32cube
upload_protocol = stlink
debug_tool = stlink
monitor_speed = 250000

build_flags =
    -std=gnu++17
    -DHSE_VALUE=8000000U
    -Ilib/Interfaces
    -Ilib/debug
    -Ilib/FatFs
    -Ilib/Nextion

monitor_filters = send_on_enter
monitor_echo = yes

; example1 → main1.cpp
[env:example1]
build_src_filter =
    +<*>
    -<main2.cpp>
    -<main3.cpp>

; example2 → main2.cpp, 10 кнопок + CID Discover
[env:example2]
build_src_filter =
    +<*>
    -<main1.cpp>
    -<main3.cpp>

; example3 → main3.cpp, 10 кнопок, id 1…10
[env:example3]
build_src_filter =
    +<*>
    -<main1.cpp>
    -<main2.cpp>
